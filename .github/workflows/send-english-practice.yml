name: Daily English Practice Email

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Triggered by'
        required: false
        default: 'manual'

permissions:
  contents: read

jobs:
  send-english:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python send_english_email_exercise.py
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
